<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="g-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="g-medal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Ribbon top -->
  <path d="M13 4 L20 1.5 L27 4 L25 12 L20 9.5 L15 12 Z" fill="url(#g-bg)"/>
  <!-- Stars on ribbon -->
  <circle cx="17" cy="7" r="1.2" fill="#FDE68A" opacity="0.7"/>
  <circle cx="20" cy="6" r="1.2" fill="#FDE68A" opacity="0.7"/>
  <circle cx="23" cy="7" r="1.2" fill="#FDE68A" opacity="0.7"/>
  <!-- Medal circle outer glow -->
  <circle cx="20" cy="26" r="14" fill="#F59E0B" opacity="0.12"/>
  <!-- Medal circle -->
  <circle cx="20" cy="26" r="13" fill="url(#g-medal)"/>
  <circle cx="20" cy="26" r="11" fill="none" stroke="#FDE68A" stroke-width="1.2" opacity="0.7"/>
  <circle cx="20" cy="26" r="9"  fill="url(#g-inner)" opacity="0.6"/>
  <!-- Crown -->
  <path d="M14 28 L14 24 L16.5 26 L20 22 L23.5 26 L26 24 L26 28 Z" fill="#FFFBEB" opacity="0.9"/>
  <!-- Dots on crown -->
  <circle cx="14"   cy="24" r="1.2" fill="#FDE68A"/>
  <circle cx="20"   cy="22" r="1.2" fill="#FDE68A"/>
  <circle cx="26"   cy="24" r="1.2" fill="#FDE68A"/>
  <!-- Shine -->
  <ellipse cx="15" cy="22" rx="3.5" ry="2" fill="white" opacity="0.25" transform="rotate(-30 15 22)"/>
</svg>
