<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="p-medal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#93C5FD"/>
      <stop offset="50%"  stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="p-diamond" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="20" cy="26" r="15" fill="#3B82F6" opacity="0.1"/>
  <!-- Ribbon top -->
  <path d="M13 4 L20 1.5 L27 4 L25 12 L20 9.5 L15 12 Z" fill="url(#p-bg)"/>
  <!-- Sparkle dots on ribbon -->
  <circle cx="16" cy="6.5" r="1" fill="#93C5FD" opacity="0.8"/>
  <circle cx="20" cy="5.5" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="24" cy="6.5" r="1" fill="#93C5FD" opacity="0.8"/>
  <!-- Medal circle -->
  <circle cx="20" cy="26" r="13" fill="url(#p-medal)"/>
  <circle cx="20" cy="26" r="11" fill="none" stroke="#BFDBFE" stroke-width="1.2" opacity="0.6"/>
  <!-- Diamond shape -->
  <path d="M20 15 L27 23 L20 33 L13 23 Z" fill="url(#p-diamond)" opacity="0.85"/>
  <!-- Diamond inner lines -->
  <line x1="13" y1="23" x2="27" y2="23" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="15" x2="20" y2="33" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <!-- Top facet -->
  <path d="M20 15 L27 23 L20 23 Z" fill="white" opacity="0.25"/>
  <!-- Shine highlight -->
  <ellipse cx="16" cy="20" rx="3" ry="2" fill="white" opacity="0.3" transform="rotate(-25 16 20)"/>
  <!-- Corner sparkles -->
  <path d="M8 14 L9 12 L10 14 L9 16 Z"  fill="#93C5FD" opacity="0.5"/>
  <path d="M30 14 L31 12 L32 14 L31 16 Z" fill="#93C5FD" opacity="0.5"/>
  <path d="M8 36 L9 34 L10 36 L9 38 Z"  fill="#93C5FD" opacity="0.4"/>
</svg>
