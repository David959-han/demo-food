<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="le-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="le-star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Main loyalty card (ghost) -->
  <rect x="24" y="38" width="112" height="72" rx="12" fill="url(#le-card)" stroke="#F97316" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <!-- Chip area (ghost) -->
  <rect x="36" y="54" width="24" height="18" rx="4" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="1" stroke-dasharray="3 2" opacity_stroke="0.3"/>
  <!-- Card number dots -->
  <circle cx="36" cy="92" r="2.5" fill="#F97316" opacity="0.15"/>
  <circle cx="43" cy="92" r="2.5" fill="#F97316" opacity="0.15"/>
  <circle cx="50" cy="92" r="2.5" fill="#F97316" opacity="0.15"/>
  <circle cx="57" cy="92" r="2.5" fill="#F97316" opacity="0.15"/>
  <!-- Tier text ghost -->
  <rect x="36" y="80" width="40" height="6" rx="3" fill="#F97316" opacity="0.1"/>
  <!-- Star icon ghost on card -->
  <path d="M112 52 l2 6 6 0 -5 3.8 1.8 6 -5.8-3.5 -5.8 3.5 1.8-6 -5-3.8 6 0Z" fill="#F97316" opacity="0.15"/>

  <!-- 3 small stars floating -->
  <path d="M22 28 l1.2 3.5 3.8 0 -3 2.4 1.1 3.5 -3.1-2 -3.1 2 1.1-3.5 -3-2.4 3.8 0Z" fill="url(#le-star)" opacity="0.3"/>
  <path d="M130 36 l1 2.8 3 0 -2.4 1.9 0.9 2.8 -2.5-1.6 -2.5 1.6 0.9-2.8 -2.4-1.9 3 0Z" fill="url(#le-star)" opacity="0.25"/>
  <path d="M135 115 l0.8 2.2 2.4 0 -1.9 1.5 0.7 2.2 -2-1.3 -2 1.3 0.7-2.2 -1.9-1.5 2.4 0Z" fill="url(#le-star)" opacity="0.2"/>

  <!-- Question mark in center of card -->
  <text x="80" y="82" text-anchor="middle" font-size="28" font-weight="900" fill="#F97316" font-family="system-ui" opacity="0.15">?</text>

  <!-- Bottom: tier badges (ghost) -->
  <circle cx="52" cy="130" r="10" fill="#D97706" opacity="0.12" stroke="#D97706" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="52" y="134" text-anchor="middle" font-size="7" fill="#D97706" font-family="system-ui" opacity="0.4" font-weight="700">B</text>

  <circle cx="72" cy="128" r="10" fill="#9CA3AF" opacity="0.12" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M72 122 l1.3 4 4 0 -3.3 2.5 1.3 4 -3.3-2.2-3.3 2.2 1.3-4 -3.3-2.5 4 0Z" fill="#9CA3AF" opacity="0.3" transform="scale(0.55) translate(77 176)"/>

  <circle cx="92" cy="130" r="10" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="92" y="134.5" text-anchor="middle" font-size="9" fill="#F59E0B" font-family="system-ui" opacity="0.4">★</text>

  <circle cx="112" cy="128" r="10" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-width="1" stroke-dasharray="2 2"/>
  <path d="M112 121 L117 128 L112 135 L107 128 Z" fill="#3B82F6" opacity="0.25"/>

  <!-- Decorative dots -->
  <circle cx="14"  cy="70" r="2"   fill="#F97316" opacity="0.15"/>
  <circle cx="146" cy="65" r="1.5" fill="#F59E0B" opacity="0.2"/>
  <circle cx="14"  cy="140" r="1.5" fill="#3B82F6" opacity="0.15"/>
</svg>
