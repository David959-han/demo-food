<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="lh-card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lh-card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lh-card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#9CA3AF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6B7280" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="lh-star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="lh-glow1">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="lh-glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Ambient glows -->
  <circle cx="130" cy="90"  r="80" fill="#3B82F6"  opacity="0.05" filter="url(#lh-glow1)"/>
  <circle cx="340" cy="80"  r="70" fill="#F59E0B"  opacity="0.06" filter="url(#lh-glow2)"/>
  <circle cx="240" cy="140" r="50" fill="#F97316"  opacity="0.04" filter="url(#lh-glow2)"/>

  <!-- ===== PLATINUM CARD (back, tilted) ===== -->
  <g transform="translate(30,40) rotate(-8)">
    <rect width="130" height="80" rx="10" fill="url(#lh-card1)"/>
    <rect width="130" height="80" rx="10" fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.4"/>
    <!-- Chip -->
    <rect x="12" y="22" width="22" height="17" rx="3" fill="#BFDBFE" opacity="0.35"/>
    <line x1="12" y1="30" x2="34" y2="30" stroke="#93C5FD" stroke-width="0.7" opacity="0.5"/>
    <line x1="22" y1="22" x2="22" y2="39" stroke="#93C5FD" stroke-width="0.7" opacity="0.5"/>
    <!-- PLATINUM text -->
    <text x="12" y="56" font-size="7" font-weight="700" fill="#DBEAFE" font-family="system-ui" letter-spacing="2" opacity="0.8">PLATINUM</text>
    <!-- Card number dots -->
    <circle cx="12" cy="67" r="1.5" fill="#93C5FD" opacity="0.6"/>
    <circle cx="16" cy="67" r="1.5" fill="#93C5FD" opacity="0.6"/>
    <circle cx="20" cy="67" r="1.5" fill="#93C5FD" opacity="0.6"/>
    <circle cx="24" cy="67" r="1.5" fill="#93C5FD" opacity="0.6"/>
    <!-- Diamond icon -->
    <path d="M110 18 L118 26 L110 36 L102 26 Z" fill="#DBEAFE" opacity="0.4"/>
    <!-- Shine -->
    <ellipse cx="22" cy="20" rx="15" ry="6" fill="white" opacity="0.06" transform="rotate(-15 22 20)"/>
  </g>

  <!-- ===== GOLD CARD (middle, slightly tilted) ===== -->
  <g transform="translate(80,55) rotate(-2)">
    <rect width="135" height="82" rx="10" fill="url(#lh-card2)"/>
    <rect width="135" height="82" rx="10" fill="none" stroke="#FDE68A" stroke-width="1.2" opacity="0.5"/>
    <!-- Chip -->
    <rect x="14" y="22" width="22" height="17" rx="3" fill="#FDE68A" opacity="0.3"/>
    <line x1="14" y1="30" x2="36" y2="30" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
    <line x1="25" y1="22" x2="25" y2="39" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>
    <!-- GOLD text -->
    <text x="14" y="57" font-size="7" font-weight="700" fill="#FFFBEB" font-family="system-ui" letter-spacing="3" opacity="0.9">GOLD</text>
    <!-- Card number -->
    <circle cx="14" cy="68" r="1.5" fill="#FDE68A" opacity="0.7"/>
    <circle cx="18" cy="68" r="1.5" fill="#FDE68A" opacity="0.7"/>
    <circle cx="22" cy="68" r="1.5" fill="#FDE68A" opacity="0.7"/>
    <circle cx="26" cy="68" r="1.5" fill="#FDE68A" opacity="0.7"/>
    <!-- Crown -->
    <path d="M108 16 L108 20 L111 18 L114 22 L117 18 L120 20 L120 16 Z" fill="#FDE68A" opacity="0.6"/>
    <!-- Stars row -->
    <text x="104" y="30" font-size="8" fill="#FDE68A" font-family="system-ui" opacity="0.7">★★★</text>
    <!-- Shine -->
    <ellipse cx="24" cy="18" rx="18" ry="6" fill="white" opacity="0.08" transform="rotate(-10 24 18)"/>
  </g>

  <!-- ===== SILVER CARD (front, minimal tilt) ===== -->
  <g transform="translate(140,65) rotate(3)">
    <rect width="130" height="80" rx="10" fill="url(#lh-card3)"/>
    <rect width="130" height="80" rx="10" fill="none" stroke="#E5E7EB" stroke-width="1" opacity="0.4"/>
    <!-- Chip -->
    <rect x="12" y="20" width="22" height="17" rx="3" fill="#F9FAFB" opacity="0.2"/>
    <line x1="12" y1="28" x2="34" y2="28" stroke="#D1D5DB" stroke-width="0.7" opacity="0.5"/>
    <line x1="23" y1="20" x2="23" y2="37" stroke="#D1D5DB" stroke-width="0.7" opacity="0.5"/>
    <!-- SILVER text -->
    <text x="12" y="55" font-size="7" font-weight="700" fill="#F9FAFB" font-family="system-ui" letter-spacing="2" opacity="0.8">SILVER</text>
    <!-- Card number -->
    <circle cx="12" cy="66" r="1.5" fill="#D1D5DB" opacity="0.6"/>
    <circle cx="16" cy="66" r="1.5" fill="#D1D5DB" opacity="0.6"/>
    <circle cx="20" cy="66" r="1.5" fill="#D1D5DB" opacity="0.6"/>
    <circle cx="24" cy="66" r="1.5" fill="#D1D5DB" opacity="0.6"/>
    <!-- Star icon -->
    <path d="M108 14 l2 5 h5 l-4 3 1.5 5 L108 24 l-4.5 3 1.5-5 -4-3 h5 Z" fill="#E5E7EB" opacity="0.5"/>
    <!-- Shine -->
    <ellipse cx="22" cy="18" rx="16" ry="5" fill="white" opacity="0.1" transform="rotate(-8 22 18)"/>
  </g>

  <!-- ===== TIER PROGRESSION (right side) ===== -->
  <!-- Track line -->
  <line x1="320" y1="40" x2="320" y2="150" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.2"/>

  <!-- Bronze node -->
  <circle cx="320" cy="140" r="12" fill="#92400E" opacity="0.7"/>
  <circle cx="320" cy="140" r="9"  fill="#D97706" opacity="0.6"/>
  <text x="320" y="144" text-anchor="middle" font-size="7" font-weight="800" fill="#FDE68A" font-family="system-ui">B</text>
  <text x="340" y="144" font-size="8" fill="#D97706" font-family="system-ui" opacity="0.8">Bronze</text>

  <!-- Silver node -->
  <circle cx="320" cy="110" r="12" fill="#6B7280" opacity="0.7"/>
  <circle cx="320" cy="110" r="9"  fill="#9CA3AF" opacity="0.6"/>
  <path d="M320 104 l1.8 5 h5.2 l-4.2 3.2 1.6 5-4.4-3-4.4 3 1.6-5-4.2-3.2 h5.2Z" fill="#F9FAFB" opacity="0.7" transform="scale(0.55) translate(262 145)"/>
  <text x="340" y="114" font-size="8" fill="#9CA3AF" font-family="system-ui" opacity="0.8">Silver</text>

  <!-- Gold node -->
  <circle cx="320" cy="78" r="14" fill="#F59E0B" opacity="0.15" filter="url(#lh-glow2)"/>
  <circle cx="320" cy="78" r="12" fill="#B45309" opacity="0.7"/>
  <circle cx="320" cy="78" r="9"  fill="#FCD34D" opacity="0.7"/>
  <text x="320" y="82" text-anchor="middle" font-size="10" fill="#78350F" font-family="system-ui" font-weight="800">★</text>
  <text x="340" y="82" font-size="8" fill="#FCD34D" font-family="system-ui" font-weight="600">Gold</text>

  <!-- Platinum node (top, highlighted) -->
  <circle cx="320" cy="42" r="16" fill="#3B82F6" opacity="0.15" filter="url(#lh-glow2)"/>
  <circle cx="320" cy="42" r="13" fill="#1D4ED8" opacity="0.8"/>
  <circle cx="320" cy="42" r="10" fill="#60A5FA" opacity="0.5"/>
  <path d="M320 34 L326 42 L320 50 L314 42 Z" fill="#DBEAFE" opacity="0.8"/>
  <text x="340" y="46" font-size="8" fill="#60A5FA" font-family="system-ui" font-weight="700">Platinum</text>

  <!-- === STARS floating === -->
  <path d="M240 30 l3 8 8 0 -6.5 5 2.5 8 -7-4.5 -7 4.5 2.5-8 -6.5-5 8 0Z" fill="url(#lh-star)" opacity="0.45"/>
  <path d="M380 70 l2 5 5 0 -4 3.2 1.5 5 -4.5-2.8 -4.5 2.8 1.5-5 -4-3.2 5 0Z" fill="url(#lh-star)" opacity="0.35"/>
  <path d="M430 30 l1.5 4 4 0 -3.2 2.5 1.2 4 -3.5-2.2 -3.5 2.2 1.2-4 -3.2-2.5 4 0Z" fill="url(#lh-star)" opacity="0.3"/>
  <path d="M260 145 l1.2 3.5 3.5 0 -2.8 2.2 1 3.5 -3-1.9 -3 1.9 1-3.5 -2.8-2.2 3.5 0Z" fill="url(#lh-star)" opacity="0.25"/>

  <!-- Points chip -->
  <rect x="380" y="118" width="82" height="32" rx="8" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="1" opacity_stroke="0.25"/>
  <text x="388" y="132" font-size="7"  fill="#F97316" font-family="system-ui" opacity="0.7" font-weight="600">TOTAL POINTS</text>
  <text x="388" y="143" font-size="10" fill="#FB923C" font-family="system-ui" font-weight="900">12,840</text>

  <!-- Decorative dots -->
  <circle cx="220" cy="15"  r="2.5" fill="#F97316" opacity="0.2"/>
  <circle cx="468" cy="160" r="2"   fill="#3B82F6" opacity="0.25"/>
  <circle cx="460" cy="10"  r="3"   fill="#F59E0B" opacity="0.2"/>
</svg>
