<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="kh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="kh-flame1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#F97316"/>
      <stop offset="60%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="kh-flame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="kh-pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A3F52"/>
      <stop offset="100%" stop-color="#222632"/>
    </linearGradient>
    <radialGradient id="kh-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="kh-blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- Background fill -->
  <rect width="480" height="180" fill="url(#kh-bg)"/>

  <!-- Ambient glow center-right -->
  <ellipse cx="340" cy="110" rx="130" ry="80" fill="url(#kh-glow)" filter="url(#kh-blur)"/>

  <!-- Counter / shelf -->
  <rect x="200" y="130" width="280" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="200" y="138" width="280" height="42" rx="0" fill="#1A1D26"/>

  <!-- Pot 1 (large, center) -->
  <rect x="280" y="95" width="72" height="42" rx="8" fill="url(#kh-pot)"/>
  <rect x="274" y="88" width="84" height="14" rx="7" fill="#3A3F52"/>
  <!-- Pot handle left -->
  <rect x="258" y="96" width="18" height="8" rx="4" fill="#2A2D3A"/>
  <!-- Pot handle right -->
  <rect x="356" y="96" width="18" height="8" rx="4" fill="#2A2D3A"/>
  <!-- Pot lid knob -->
  <circle cx="316" cy="85" r="5" fill="#4A4F62"/>

  <!-- Flames under pot 1 -->
  <ellipse cx="300" cy="135" rx="8" ry="14" fill="url(#kh-flame1)" opacity="0.9"/>
  <ellipse cx="316" cy="138" rx="6" ry="12" fill="url(#kh-flame2)" opacity="0.8"/>
  <ellipse cx="332" cy="135" rx="8" ry="14" fill="url(#kh-flame1)" opacity="0.9"/>

  <!-- Pot 2 (smaller, right) -->
  <rect x="380" y="105" width="54" height="30" rx="7" fill="url(#kh-pot)"/>
  <rect x="374" y="98" width="66" height="12" rx="6" fill="#3A3F52"/>
  <rect x="360" y="105" width="14" height="7" rx="3.5" fill="#2A2D3A"/>
  <circle cx="407" cy="95" r="4" fill="#4A4F62"/>

  <!-- Flames under pot 2 -->
  <ellipse cx="395" cy="135" rx="6" ry="10" fill="url(#kh-flame1)" opacity="0.85"/>
  <ellipse cx="415" cy="135" rx="5" ry="9" fill="url(#kh-flame2)" opacity="0.7"/>

  <!-- Clock / timer (upper right) -->
  <circle cx="440" cy="42" r="22" fill="#1A1D26" stroke="#2A2D3A" stroke-width="2"/>
  <circle cx="440" cy="42" r="17" fill="none" stroke="#3A3F52" stroke-width="1"/>
  <line x1="440" y1="30" x2="440" y2="42" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="440" y1="42" x2="450" y2="48" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="440" cy="42" r="2.5" fill="#F97316"/>

  <!-- Order ticket strip -->
  <rect x="210" y="55" width="52" height="62" rx="4" fill="#1A1D26" stroke="#2A2D3A" stroke-width="1"/>
  <line x1="218" y1="67" x2="254" y2="67" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="218" y1="76" x2="248" y2="76" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="218" y1="85" x2="251" y2="85" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="218" y1="94" x2="244" y2="94" stroke="#F97316" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="218" y="102" width="26" height="8" rx="3" fill="#F97316" opacity="0.8"/>

  <!-- Steam wisps -->
  <path d="M310 82 Q306 72 310 62 Q314 52 310 42" stroke="#F1F3F9" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M322 80 Q318 70 322 60 Q326 50 322 40" stroke="#F1F3F9" stroke-opacity="0.09" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M334 82 Q330 72 334 62 Q338 52 334 44" stroke="#F1F3F9" stroke-opacity="0.10" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Decorative dots grid (upper left) -->
  <g opacity="0.15">
    <circle cx="228" cy="28" r="2" fill="#F97316"/>
    <circle cx="240" cy="28" r="2" fill="#F97316"/>
    <circle cx="252" cy="28" r="2" fill="#F97316"/>
    <circle cx="228" cy="40" r="2" fill="#F97316"/>
    <circle cx="240" cy="40" r="2" fill="#F97316"/>
    <circle cx="252" cy="40" r="2" fill="#F97316"/>
  </g>

  <!-- Left-side fade for text legibility -->
  <rect width="210" height="180" fill="url(#kh-bg)" opacity="0.6"/>
</svg>
