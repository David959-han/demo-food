<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="ih-shelf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ih-box1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="ih-box2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="ih-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background glow blobs -->
  <circle cx="80"  cy="90"  r="60" fill="#F97316" opacity="0.04" filter="url(#ih-glow)"/>
  <circle cx="380" cy="80"  r="70" fill="#10B981" opacity="0.04" filter="url(#ih-glow)"/>

  <!-- ===== SHELVING UNIT (left side) ===== -->
  <!-- Vertical supports -->
  <rect x="20" y="30" width="4" height="140" rx="2" fill="#F97316" opacity="0.2"/>
  <rect x="130" y="30" width="4" height="140" rx="2" fill="#F97316" opacity="0.2"/>
  <rect x="75" y="30" width="3" height="140" rx="1.5" fill="#F97316" opacity="0.12"/>
  <!-- Shelves -->
  <rect x="18" y="155" width="118" height="5"  rx="2" fill="url(#ih-shelf)" opacity="0.8"/>
  <rect x="18" y="115" width="118" height="5"  rx="2" fill="url(#ih-shelf)" opacity="0.7"/>
  <rect x="18" y="75"  width="118" height="5"  rx="2" fill="url(#ih-shelf)" opacity="0.6"/>
  <rect x="18" y="35"  width="118" height="4"  rx="2" fill="url(#ih-shelf)" opacity="0.5"/>

  <!-- Bottom shelf boxes -->
  <rect x="24"  y="128" width="28" height="25" rx="3" fill="url(#ih-box1)" stroke="#F97316" stroke-width="1.2"/>
  <line x1="38" y1="128" x2="38" y2="153" stroke="#F97316" stroke-width="0.8" opacity="0.35"/>
  <path d="M24 137 Q38 141 52 137" stroke="#F97316" stroke-width="0.8" fill="none" opacity="0.3"/>
  <rect x="57"  y="131" width="22" height="22" rx="3" fill="url(#ih-box2)" stroke="#10B981" stroke-width="1.2"/>
  <rect x="84"  y="128" width="26" height="25" rx="3" fill="url(#ih-box1)" stroke="#F97316" stroke-width="1.2"/>
  <line x1="97" y1="128" x2="97" y2="153" stroke="#F97316" stroke-width="0.8" opacity="0.3"/>
  <rect x="115" y="133" width="16" height="20" rx="2.5" fill="url(#ih-box2)" stroke="#10B981" stroke-width="1.2"/>

  <!-- Middle shelf boxes -->
  <rect x="24"  y="88"  width="22" height="20" rx="3" fill="url(#ih-box2)" stroke="#10B981" stroke-width="1.2"/>
  <rect x="51"  y="86"  width="30" height="22" rx="3" fill="url(#ih-box1)" stroke="#F97316" stroke-width="1.2"/>
  <line x1="66" y1="86" x2="66" y2="108" stroke="#F97316" stroke-width="0.8" opacity="0.3"/>
  <rect x="87"  y="90"  width="20" height="18" rx="3" fill="url(#ih-box2)" stroke="#10B981" stroke-width="1.2"/>
  <rect x="113" y="88"  width="16" height="20" rx="3" fill="url(#ih-box1)" stroke="#F97316" stroke-width="1.2"/>

  <!-- Top shelf - fewer boxes, dashed ghost slots -->
  <rect x="24"  y="48"  width="24" height="20" rx="3" fill="url(#ih-box1)" stroke="#F97316" stroke-width="1.2"/>
  <rect x="55"  y="50"  width="28" height="18" rx="3" fill="none" stroke="#F97316" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <rect x="90"  y="48"  width="24" height="20" rx="3" fill="url(#ih-box2)" stroke="#10B981" stroke-width="1.2"/>

  <!-- ===== BARCODE SCANNER (center) ===== -->
  <rect x="160" y="65" width="60" height="80" rx="10" fill="#F97316" opacity="0.07" stroke="#F97316" stroke-width="1.5"/>
  <!-- Scanner screen -->
  <rect x="166" y="72" width="48" height="36" rx="5" fill="#F97316" opacity="0.1"/>
  <!-- Barcode lines -->
  <line x1="172" y1="78" x2="172" y2="100" stroke="#F97316" stroke-width="2"   opacity="0.5"/>
  <line x1="176" y1="78" x2="176" y2="100" stroke="#F97316" stroke-width="1"   opacity="0.4"/>
  <line x1="179" y1="78" x2="179" y2="100" stroke="#F97316" stroke-width="2.5" opacity="0.45"/>
  <line x1="183" y1="78" x2="183" y2="100" stroke="#F97316" stroke-width="1"   opacity="0.35"/>
  <line x1="186" y1="78" x2="186" y2="100" stroke="#F97316" stroke-width="3"   opacity="0.5"/>
  <line x1="191" y1="78" x2="191" y2="100" stroke="#F97316" stroke-width="1.5" opacity="0.4"/>
  <line x1="194" y1="78" x2="194" y2="100" stroke="#F97316" stroke-width="2"   opacity="0.45"/>
  <line x1="198" y1="78" x2="198" y2="100" stroke="#F97316" stroke-width="1"   opacity="0.35"/>
  <line x1="201" y1="78" x2="201" y2="100" stroke="#F97316" stroke-width="2.5" opacity="0.5"/>
  <line x1="205" y1="78" x2="205" y2="100" stroke="#F97316" stroke-width="1"   opacity="0.4"/>
  <line x1="208" y1="78" x2="208" y2="100" stroke="#F97316" stroke-width="2"   opacity="0.45"/>
  <!-- Scan laser line -->
  <line x1="168" y1="89" x2="210" y2="89" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
  <!-- Scanner handle -->
  <rect x="180" y="108" width="20" height="28" rx="6" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="1.2"/>
  <rect x="186" y="114" width="8" height="4" rx="1" fill="#F97316" opacity="0.25"/>

  <!-- ===== STOCK CHART BARS (right side) ===== -->
  <!-- Chart frame -->
  <rect x="240" y="32" width="220" height="130" rx="10" fill="#F97316" opacity="0.04" stroke="#F97316" stroke-width="1" stroke-dasharray="4 3" opacity_stroke="0.2"/>
  <!-- X axis -->
  <line x1="256" y1="142" x2="448" y2="142" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <!-- Y axis -->
  <line x1="256" y1="42"  x2="256" y2="142" stroke="#F97316" stroke-width="1" opacity="0.2"/>
  <!-- Grid lines -->
  <line x1="256" y1="112" x2="448" y2="112" stroke="#F97316" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.15"/>
  <line x1="256" y1="82"  x2="448" y2="82"  stroke="#F97316" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.15"/>
  <line x1="256" y1="52"  x2="448" y2="52"  stroke="#F97316" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.12"/>

  <!-- Bars (categories) -->
  <!-- Proteins -->
  <rect x="268" y="82" width="22" height="60" rx="3" fill="#F97316" opacity="0.5"/>
  <rect x="268" y="82" width="22" height="60" rx="3" fill="url(#ih-box1)"/>
  <!-- Vegetables -->
  <rect x="298" y="62" width="22" height="80" rx="3" fill="#10B981" opacity="0.45"/>
  <!-- Dairy -->
  <rect x="328" y="72" width="22" height="70" rx="3" fill="#F97316" opacity="0.35"/>
  <!-- Grains -->
  <rect x="358" y="52" width="22" height="90" rx="3" fill="#10B981" opacity="0.3"/>
  <!-- Beverages -->
  <rect x="388" y="88" width="22" height="54" rx="3" fill="#F97316" opacity="0.25"/>
  <!-- Sauces -->
  <rect x="418" y="95" width="22" height="47" rx="3" fill="#10B981" opacity="0.3"/>

  <!-- Bar labels (tiny) -->
  <text x="279" y="152" text-anchor="middle" font-size="7" fill="#F97316" font-family="system-ui" opacity="0.5">Pro</text>
  <text x="309" y="152" text-anchor="middle" font-size="7" fill="#10B981" font-family="system-ui" opacity="0.5">Veg</text>
  <text x="339" y="152" text-anchor="middle" font-size="7" fill="#F97316" font-family="system-ui" opacity="0.5">Dai</text>
  <text x="369" y="152" text-anchor="middle" font-size="7" fill="#10B981" font-family="system-ui" opacity="0.5">Gra</text>
  <text x="399" y="152" text-anchor="middle" font-size="7" fill="#F97316" font-family="system-ui" opacity="0.5">Bev</text>
  <text x="429" y="152" text-anchor="middle" font-size="7" fill="#10B981" font-family="system-ui" opacity="0.5">Sau</text>

  <!-- Trend line over bars -->
  <path d="M279 85 L309 65 L339 75 L369 55 L399 90 L429 97" stroke="#F97316" stroke-width="1.5" fill="none" stroke-dasharray="4 2" opacity="0.4"/>

  <!-- Decorative dots -->
  <circle cx="12"  cy="90"  r="3" fill="#F97316" opacity="0.15"/>
  <circle cx="468" cy="35"  r="2" fill="#10B981" opacity="0.2"/>
  <circle cx="468" cy="165" r="2" fill="#F97316" opacity="0.2"/>
</svg>
