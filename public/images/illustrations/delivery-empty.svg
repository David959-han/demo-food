<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="box-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Sparkles / decorative dots -->
  <circle cx="24"  cy="34"  r="3" fill="#F97316" opacity="0.3"/>
  <circle cx="138" cy="28"  r="2" fill="#10B981" opacity="0.4"/>
  <circle cx="18"  cy="108" r="2" fill="#F97316" opacity="0.2"/>
  <circle cx="144" cy="110" r="3" fill="#10B981" opacity="0.25"/>
  <circle cx="80"  cy="16"  r="2.5" fill="#F97316" opacity="0.35"/>

  <!-- Stars -->
  <path d="M 36 50 L 37.5 47 L 39 50 L 42 50 L 39.5 52 L 40.5 55 L 37.5 53 L 34.5 55 L 35.5 52 L 33 50 Z"
        fill="#F97316" opacity="0.25"/>
  <path d="M 122 62 L 123 59.5 L 124 62 L 126.5 62 L 124.5 63.5 L 125.2 66 L 123 64.5 L 120.8 66 L 121.5 63.5 L 119.5 62 Z"
        fill="#10B981" opacity="0.3"/>

  <!-- Main package box body -->
  <rect x="32" y="68" width="96" height="72" rx="8" fill="url(#box-grad)"/>
  <rect x="32" y="68" width="96" height="72" rx="8" stroke="#F97316" stroke-width="2" opacity="0.3"/>

  <!-- Box lid / top flap -->
  <path d="M 30 74 L 80 60 L 130 74" fill="#F97316" opacity="0.12"/>
  <path d="M 30 74 L 80 60 L 130 74" stroke="#F97316" stroke-width="1.8" stroke-linejoin="round" opacity="0.35"/>

  <!-- Box flap fold line -->
  <line x1="80" y1="60" x2="80" y2="74" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>

  <!-- Vertical ribbon -->
  <line x1="80" y1="68" x2="80" y2="140" stroke="#F97316" stroke-width="2.5" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Horizontal ribbon -->
  <line x1="32" y1="104" x2="128" y2="104" stroke="#F97316" stroke-width="2.5" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Bow knot -->
  <path d="M 73 63 Q 64 54 70 48 Q 76 42 80 52" stroke="#F97316" stroke-width="2.5"
        fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 87 63 Q 96 54 90 48 Q 84 42 80 52" stroke="#F97316" stroke-width="2.5"
        fill="none" stroke-linecap="round" opacity="0.55"/>
  <circle cx="80" cy="56" r="3.5" fill="#F97316" opacity="0.6"/>

  <!-- Box handle icon (inner) -->
  <rect x="66" y="88" width="28" height="6" rx="3" fill="#F97316" opacity="0.15"/>

  <!-- Green checkmark badge -->
  <circle cx="114" cy="72" r="20" fill="#0D120F"/>
  <circle cx="114" cy="72" r="18" fill="#10B981" opacity="0.15"/>
  <circle cx="114" cy="72" r="15" fill="#10B981" opacity="0.2"/>
  <circle cx="114" cy="72" r="12" fill="#10B981" opacity="0.5" stroke="#10B981" stroke-width="1.5" opacity_stroke="0.7"/>

  <!-- Checkmark -->
  <path d="M 105 72 L 111 79 L 124 62"
        stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
