<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="eh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="eh-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1D26"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <radialGradient id="eh-glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eh-glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="eh-blur"><feGaussianBlur stdDeviation="10"/></filter>
    <clipPath id="eh-av1"><circle cx="282" cy="62" r="22"/></clipPath>
    <clipPath id="eh-av2"><circle cx="340" cy="52" r="18"/></clipPath>
    <clipPath id="eh-av3"><circle cx="396" cy="60" r="20"/></clipPath>
  </defs>

  <rect width="480" height="180" fill="url(#eh-bg)"/>

  <!-- Glows -->
  <ellipse cx="310" cy="80" rx="120" ry="70" fill="url(#eh-glow1)" filter="url(#eh-blur)"/>
  <ellipse cx="420" cy="100" rx="80"  ry="50" fill="url(#eh-glow2)" filter="url(#eh-blur)"/>

  <!-- Connection lines (org-chart feel) -->
  <line x1="282" y1="84" x2="282" y2="110" stroke="#10B981" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="340" y1="70" x2="340" y2="110" stroke="#3B82F6" stroke-opacity="0.20" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="396" y1="80" x2="396" y2="110" stroke="#10B981" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="282" y1="110" x2="396" y2="110" stroke="#2A2D3A" stroke-width="1.5"/>

  <!-- Avatar 1 (large, center) -->
  <circle cx="282" cy="62" r="24" fill="#1A1D26" stroke="#10B981" stroke-opacity="0.5" stroke-width="2"/>
  <!-- Body silhouette 1 -->
  <circle cx="282" cy="56" r="9" fill="#3A4F62"/>
  <ellipse cx="282" cy="76" rx="13" ry="8" fill="#3A4F62"/>
  <!-- Status dot -->
  <circle cx="298" cy="48" r="5" fill="#10B981"/>
  <circle cx="298" cy="48" r="3" fill="#34D399"/>

  <!-- Avatar 2 (medium, left of center) -->
  <circle cx="340" cy="52" r="20" fill="#1A1D26" stroke="#3B82F6" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="340" cy="47" r="7.5" fill="#3A4F62"/>
  <ellipse cx="340" cy="64" rx="11" ry="7" fill="#3A4F62"/>
  <circle cx="354" cy="40" r="4.5" fill="#F59E0B"/>
  <circle cx="354" cy="40" r="2.5" fill="#FBBF24"/>

  <!-- Avatar 3 (medium, right) -->
  <circle cx="396" cy="60" r="22" fill="#1A1D26" stroke="#10B981" stroke-opacity="0.45" stroke-width="1.5"/>
  <circle cx="396" cy="54" r="8.5" fill="#3A4F62"/>
  <ellipse cx="396" cy="72" rx="12" ry="7.5" fill="#3A4F62"/>
  <circle cx="411" cy="47" r="4.5" fill="#10B981"/>
  <circle cx="411" cy="47" r="2.5" fill="#34D399"/>

  <!-- Employee cards (bottom) -->
  <!-- Card 1 -->
  <rect x="220" y="118" width="80" height="44" rx="8" fill="url(#eh-card)" stroke="#2A2D3A" stroke-width="1"/>
  <circle cx="238" cy="133" r="8" fill="#2A2D3A"/>
  <line x1="250" y1="130" x2="290" y2="130" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="137" x2="282" y2="137" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <rect x="228" y="148" width="30" height="6" rx="3" fill="#10B981" opacity="0.7"/>

  <!-- Card 2 -->
  <rect x="312" y="118" width="80" height="44" rx="8" fill="url(#eh-card)" stroke="#2A2D3A" stroke-width="1"/>
  <circle cx="330" cy="133" r="8" fill="#2A2D3A"/>
  <line x1="342" y1="130" x2="382" y2="130" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="342" y1="137" x2="374" y2="137" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <rect x="320" y="148" width="30" height="6" rx="3" fill="#F59E0B" opacity="0.7"/>

  <!-- Card 3 -->
  <rect x="404" y="118" width="68" height="44" rx="8" fill="url(#eh-card)" stroke="#2A2D3A" stroke-width="1"/>
  <circle cx="420" cy="133" r="8" fill="#2A2D3A"/>
  <line x1="432" y1="130" x2="462" y2="130" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="432" y1="137" x2="458" y2="137" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <rect x="410" y="148" width="30" height="6" rx="3" fill="#10B981" opacity="0.7"/>

  <!-- Bar chart (upper right) -->
  <rect x="438" y="85"  width="10" height="30" rx="3" fill="#10B981" opacity="0.6"/>
  <rect x="452" y="75"  width="10" height="40" rx="3" fill="#3B82F6" opacity="0.6"/>
  <rect x="466" y="65"  width="10" height="50" rx="3" fill="#10B981" opacity="0.8"/>
  <line x1="435" y1="115" x2="479" y2="115" stroke="#3A3F52" stroke-width="1"/>

  <!-- Decorative grid dots -->
  <g opacity="0.12">
    <circle cx="222" cy="32" r="2" fill="#10B981"/>
    <circle cx="234" cy="32" r="2" fill="#10B981"/>
    <circle cx="246" cy="32" r="2" fill="#10B981"/>
    <circle cx="222" cy="44" r="2" fill="#10B981"/>
    <circle cx="234" cy="44" r="2" fill="#10B981"/>
    <circle cx="246" cy="44" r="2" fill="#10B981"/>
  </g>

  <!-- Left fade -->
  <rect width="215" height="180" fill="url(#eh-bg)" opacity="0.6"/>
</svg>
