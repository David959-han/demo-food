<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring glow -->
  <circle cx="32" cy="32" r="31" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="#1a1512"/>
  <circle cx="32" cy="32" r="28" fill="#F97316" opacity="0.06"/>

  <!-- Body / jacket (lower part) -->
  <path d="M 8 60 Q 8 42 32 42 Q 56 42 56 60" fill="#2a2420"/>
  <path d="M 14 60 Q 14 48 32 48 Q 50 48 50 60" fill="#F97316" opacity="0.15"/>

  <!-- Jacket zipper line -->
  <line x1="32" y1="48" x2="32" y2="62" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>

  <!-- Torso -->
  <ellipse cx="32" cy="40" rx="12" ry="6" fill="#2a2420"/>

  <!-- Head -->
  <circle cx="32" cy="25" r="10" fill="#2a2420"/>

  <!-- Helmet -->
  <path d="M 21 25 Q 21 13 32 13 Q 43 13 43 25" fill="#F97316" opacity="0.9"/>
  <rect x="20" y="24" width="24" height="5" rx="2.5" fill="#E56B0D" opacity="0.85"/>

  <!-- Visor -->
  <rect x="23" y="24" width="18" height="3" rx="1.5" fill="#F97316" opacity="0.4"/>

  <!-- Helmet vent line -->
  <path d="M 26 17 Q 32 14 38 17" stroke="#E56B0D" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Shoulder pads / gear -->
  <circle cx="20" cy="40" r="5" fill="#F97316" opacity="0.2"/>
  <circle cx="44" cy="40" r="5" fill="#F97316" opacity="0.2"/>
</svg>
