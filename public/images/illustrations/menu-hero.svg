<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="mh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="mh-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1D26"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="mh-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A2D3A"/>
      <stop offset="100%" stop-color="#1A1D26"/>
    </linearGradient>
    <radialGradient id="mh-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F97316" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="mh-blur"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="480" height="180" fill="url(#mh-bg)"/>
  <ellipse cx="340" cy="100" rx="140" ry="80" fill="url(#mh-glow)" filter="url(#mh-blur)"/>

  <!-- Menu card 1 (main) -->
  <rect x="222" y="40" width="100" height="120" rx="10" fill="url(#mh-card)" stroke="#2A2D3A" stroke-width="1.5"/>
  <!-- Image placeholder -->
  <rect x="230" y="48" width="84" height="56" rx="6" fill="#222632"/>
  <!-- Plate on image -->
  <ellipse cx="272" cy="76" rx="28" ry="20" fill="url(#mh-plate)"/>
  <ellipse cx="272" cy="76" rx="20" ry="14" fill="#111318"/>
  <!-- Food dot accent -->
  <circle cx="272" cy="76" r="6" fill="#F97316" opacity="0.7"/>
  <circle cx="262" cy="72" r="4" fill="#FBBF24" opacity="0.5"/>
  <circle cx="280" cy="80" r="3" fill="#10B981" opacity="0.5"/>
  <!-- Card content lines -->
  <line x1="230" y1="114" x2="306" y2="114" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="122" x2="290" y2="122" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <!-- Price tag -->
  <rect x="230" y="133" width="38" height="14" rx="5" fill="#F97316" opacity="0.85"/>
  <!-- Star -->
  <text x="278" y="144" font-size="11" fill="#FBBF24" opacity="0.9">★★★</text>

  <!-- Menu card 2 (right, offset) -->
  <rect x="336" y="52" width="88" height="108" rx="10" fill="url(#mh-card)" stroke="#2A2D3A" stroke-width="1.5"/>
  <rect x="344" y="60" width="72" height="48" rx="6" fill="#222632"/>
  <ellipse cx="380" cy="84" rx="24" ry="17" fill="url(#mh-plate)"/>
  <ellipse cx="380" cy="84" rx="17" ry="12" fill="#111318"/>
  <circle cx="380" cy="84" r="5" fill="#FBBF24" opacity="0.7"/>
  <circle cx="372" cy="80" r="3" fill="#EF4444" opacity="0.5"/>
  <line x1="344" y1="118" x2="416" y2="118" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="344" y1="126" x2="406" y2="126" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <rect x="344" y="137" width="34" height="12" rx="4" fill="#F59E0B" opacity="0.8"/>

  <!-- Menu card 3 (far right partial) -->
  <rect x="436" y="65" width="50" height="90" rx="10" fill="url(#mh-card)" stroke="#2A2D3A" stroke-width="1" opacity="0.6"/>
  <rect x="444" y="73" width="36" height="36" rx="5" fill="#222632"/>
  <ellipse cx="462" cy="91" rx="13" ry="10" fill="url(#mh-plate)" opacity="0.8"/>

  <!-- Star rating top right -->
  <rect x="430" y="30" width="46" height="26" rx="8" fill="#1A1D26" stroke="#2A2D3A" stroke-width="1"/>
  <text x="438" y="47" font-size="13" fill="#FBBF24">★ 4.8</text>

  <!-- Badge new (upper) -->
  <rect x="236" y="32" width="34" height="14" rx="5" fill="#10B981" opacity="0.85"/>
  <text x="241" y="43" font-size="8" font-weight="700" fill="white">NEW</text>

  <!-- Category pills -->
  <rect x="222" y="18" width="44" height="16" rx="6" fill="#F97316" opacity="0.15" stroke="#F97316" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="272" y="18" width="44" height="16" rx="6" fill="#2A2D3A"/>
  <rect x="322" y="18" width="50" height="16" rx="6" fill="#2A2D3A"/>

  <!-- Decorative dots -->
  <g opacity="0.14">
    <circle cx="228" cy="168" r="2.5" fill="#F97316"/>
    <circle cx="242" cy="168" r="2.5" fill="#F97316"/>
    <circle cx="256" cy="168" r="2.5" fill="#F97316"/>
    <circle cx="228" cy="155" r="2" fill="#F97316"/>
    <circle cx="242" cy="155" r="2" fill="#F97316"/>
  </g>

  <!-- Left fade -->
  <rect width="218" height="180" fill="url(#mh-bg)" opacity="0.6"/>
</svg>
