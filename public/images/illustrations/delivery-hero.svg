<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none">
  <defs>
    <pattern id="delivery-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.2" fill="#2a2420"/>
    </pattern>
    <linearGradient id="route-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="road-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1512"/>
      <stop offset="100%" stop-color="#100e0c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="480" height="200" rx="16" fill="#0D0B09"/>
  <rect width="480" height="200" rx="16" fill="url(#delivery-dots)"/>

  <!-- Subtle orange ambient glow center -->
  <ellipse cx="260" cy="140" rx="120" ry="40" fill="#F97316" opacity="0.04"/>

  <!-- Road surface -->
  <rect x="0" y="148" width="480" height="36" rx="0" fill="url(#road-grad)"/>
  <rect x="0" y="148" width="480" height="2" fill="#F97316" opacity="0.06"/>

  <!-- Road lane markings -->
  <rect x="30"  y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>
  <rect x="100" y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>
  <rect x="170" y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>
  <rect x="240" y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>
  <rect x="310" y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>
  <rect x="380" y="165" width="40" height="3" rx="1.5" fill="#F97316" opacity="0.15"/>

  <!-- City buildings (left cluster) -->
  <rect x="18"  y="72" width="22" height="78" rx="2" fill="#1a1512"/>
  <rect x="44"  y="90" width="16" height="60" rx="2" fill="#17140f"/>
  <rect x="64"  y="58" width="26" height="92" rx="2" fill="#1c1814"/>
  <!-- Windows left -->
  <rect x="22"  y="78"  width="5" height="4" rx="1" fill="#F97316" opacity="0.25"/>
  <rect x="30"  y="78"  width="5" height="4" rx="1" fill="#F97316" opacity="0.15"/>
  <rect x="22"  y="88"  width="5" height="4" rx="1" fill="#F97316" opacity="0.10"/>
  <rect x="30"  y="88"  width="5" height="4" rx="1" fill="#F97316" opacity="0.30"/>
  <rect x="67"  y="64"  width="6" height="4" rx="1" fill="#F97316" opacity="0.20"/>
  <rect x="76"  y="64"  width="6" height="4" rx="1" fill="#F97316" opacity="0.10"/>
  <rect x="67"  y="74"  width="6" height="4" rx="1" fill="#F97316" opacity="0.30"/>
  <rect x="76"  y="74"  width="6" height="4" rx="1" fill="#F97316" opacity="0.15"/>

  <!-- City buildings (right cluster) -->
  <rect x="374" y="68" width="24" height="82" rx="2" fill="#1a1512"/>
  <rect x="402" y="84" width="18" height="66" rx="2" fill="#17140f"/>
  <rect x="424" y="52" width="28" height="98" rx="2" fill="#1c1814"/>
  <rect x="456" y="78" width="18" height="72" rx="2" fill="#191510"/>
  <!-- Windows right -->
  <rect x="378" y="74"  width="5" height="4" rx="1" fill="#F97316" opacity="0.20"/>
  <rect x="386" y="74"  width="5" height="4" rx="1" fill="#F97316" opacity="0.10"/>
  <rect x="378" y="84"  width="5" height="4" rx="1" fill="#F97316" opacity="0.30"/>
  <rect x="386" y="84"  width="5" height="4" rx="1" fill="#F97316" opacity="0.15"/>
  <rect x="428" y="58"  width="6" height="4" rx="1" fill="#F97316" opacity="0.25"/>
  <rect x="438" y="58"  width="6" height="4" rx="1" fill="#F97316" opacity="0.12"/>
  <rect x="428" y="68"  width="6" height="4" rx="1" fill="#F97316" opacity="0.15"/>
  <rect x="438" y="68"  width="6" height="4" rx="1" fill="#F97316" opacity="0.28"/>

  <!-- Curved route path -->
  <path d="M 100 118 C 150 80 200 100 250 90 C 300 80 350 105 400 98"
        stroke="url(#route-grad)" stroke-width="2.5" stroke-dasharray="7,5"
        stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>

  <!-- Route glow underlay -->
  <path d="M 100 118 C 150 80 200 100 250 90 C 300 80 350 105 400 98"
        stroke="#F97316" stroke-width="6" stroke-linecap="round" opacity="0.06"/>

  <!-- Origin marker (green) -->
  <circle cx="100" cy="118" r="10" fill="#10B981" opacity="0.2"/>
  <circle cx="100" cy="118" r="7"  fill="#10B981" opacity="0.6"/>
  <circle cx="100" cy="118" r="4"  fill="#10B981"/>
  <circle cx="100" cy="118" r="2"  fill="white"/>

  <!-- Destination pin (orange) -->
  <path d="M 400 98 C 400 98 414 84 414 74 C 414 66.3 407.7 60 400 60 C 392.3 60 386 66.3 386 74 C 386 84 400 98 Z"
        fill="#F97316" filter="url(#glow)"/>
  <circle cx="400" cy="74" r="5" fill="white" opacity="0.9"/>

  <!-- SCOOTER at route midpoint ~x=248 y=108 -->
  <!-- Motion blur lines -->
  <line x1="222" y1="116" x2="204" y2="116" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="220" y1="124" x2="200" y2="124" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="224" y1="132" x2="210" y2="132" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Rear wheel -->
  <circle cx="240" cy="136" r="12" fill="#1a1512" stroke="#F97316" stroke-width="2.5"/>
  <circle cx="240" cy="136" r="5"  fill="#F97316"/>
  <circle cx="240" cy="136" r="2"  fill="#0D0B09"/>

  <!-- Front wheel -->
  <circle cx="278" cy="136" r="12" fill="#1a1512" stroke="#F97316" stroke-width="2.5"/>
  <circle cx="278" cy="136" r="5"  fill="#F97316"/>
  <circle cx="278" cy="136" r="2"  fill="#0D0B09"/>

  <!-- Body / frame -->
  <path d="M 243 136 L 248 114 L 274 114 L 277 136" fill="#F97316" opacity="0.9"/>
  <path d="M 248 114 L 252 106 L 268 106 L 272 114" fill="#E56B0D" opacity="0.9"/>

  <!-- Delivery box (cargo) -->
  <rect x="251" y="92" width="18" height="15" rx="3" fill="#ffffff" opacity="0.92"/>
  <rect x="251" y="92" width="18" height="6"  rx="3" fill="#E56B0D" opacity="0.8"/>
  <line x1="260" y1="92" x2="260" y2="107" stroke="#F97316" stroke-width="1.2" opacity="0.6"/>
  <line x1="251" y1="99.5" x2="269" y2="99.5" stroke="#F97316" stroke-width="1.2" opacity="0.6"/>

  <!-- Rider helmet + torso -->
  <ellipse cx="261" cy="91"  rx="9" ry="5.5" fill="#2a2420"/>
  <circle  cx="261" cy="84"  r="7"            fill="#2a2420"/>
  <rect    x="254" y="84"   width="14" height="5" rx="2.5" fill="#3a3028" opacity="0.8"/>
  <!-- Visor glow -->
  <rect    x="256" y="85"   width="10" height="3" rx="1.5" fill="#F97316" opacity="0.35"/>

  <!-- Front fork / handlebar -->
  <path d="M 274 116 L 284 108" stroke="#3a3028" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="108" x2="290" y2="110" stroke="#3a3028" stroke-width="2" stroke-linecap="round"/>

  <!-- ETA badge -->
  <rect x="124" y="64" width="64" height="24" rx="12" fill="#10B981" opacity="0.12"/>
  <rect x="124" y="64" width="64" height="24" rx="12" stroke="#10B981" stroke-width="1" opacity="0.25"/>
  <text x="156" y="80" text-anchor="middle" font-size="11" font-weight="700"
        fill="#10B981" font-family="ui-monospace,monospace">⏱ 14 min</text>

  <!-- Distance badge -->
  <rect x="312" y="58" width="64" height="24" rx="12" fill="#F97316" opacity="0.12"/>
  <rect x="312" y="58" width="64" height="24" rx="12" stroke="#F97316" stroke-width="1" opacity="0.25"/>
  <text x="344" y="74" text-anchor="middle" font-size="11" font-weight="700"
        fill="#F97316" font-family="ui-monospace,monospace">📍 2.4 km</text>
</svg>
