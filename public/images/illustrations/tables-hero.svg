<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" fill="none">
  <defs>
    <linearGradient id="th-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="th-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1A1D26"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="th-table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A2D3A"/>
      <stop offset="100%" stop-color="#1E2130"/>
    </linearGradient>
    <radialGradient id="th-glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="th-glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <filter id="th-blur"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <rect width="480" height="180" fill="url(#th-bg)"/>
  <ellipse cx="310" cy="95" rx="130" ry="80" fill="url(#th-glow1)" filter="url(#th-blur)"/>
  <ellipse cx="420" cy="130" rx="70"  ry="50" fill="url(#th-glow2)" filter="url(#th-blur)"/>

  <!-- Floor grid lines (perspective) -->
  <line x1="215" y1="170" x2="480" y2="100" stroke="#1E2130" stroke-width="1"/>
  <line x1="215" y1="170" x2="480" y2="130" stroke="#1E2130" stroke-width="1"/>
  <line x1="215" y1="170" x2="480" y2="160" stroke="#1E2130" stroke-width="1"/>

  <!-- TABLE 1 — occupied (red) -->
  <!-- Table top -->
  <rect x="235" y="70" width="68" height="52" rx="8" fill="url(#th-table)" stroke="#EF4444" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Plates on table -->
  <circle cx="255" cy="92" r="10" fill="#1A1D26" stroke="#3A3F52" stroke-width="1"/>
  <circle cx="255" cy="92" r="6" fill="#111318"/>
  <circle cx="282" cy="92" r="10" fill="#1A1D26" stroke="#3A3F52" stroke-width="1"/>
  <circle cx="282" cy="92" r="6" fill="#111318"/>
  <!-- Chairs -->
  <rect x="240" y="58"  width="20" height="10" rx="5" fill="#2A2D3A"/>
  <rect x="268" y="58"  width="20" height="10" rx="5" fill="#2A2D3A"/>
  <rect x="240" y="124" width="20" height="10" rx="5" fill="#2A2D3A"/>
  <rect x="268" y="124" width="20" height="10" rx="5" fill="#2A2D3A"/>
  <!-- Status dot -->
  <circle cx="296" cy="74" r="6" fill="#EF4444"/>
  <circle cx="296" cy="74" r="3" fill="#F87171"/>

  <!-- TABLE 2 — free (green) -->
  <rect x="328" y="60" width="60" height="46" rx="8" fill="url(#th-table)" stroke="#10B981" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Chairs -->
  <rect x="332" y="50"  width="16" height="9" rx="4" fill="#2A2D3A"/>
  <rect x="354" y="50"  width="16" height="9" rx="4" fill="#2A2D3A"/>
  <rect x="332" y="107" width="16" height="9" rx="4" fill="#2A2D3A"/>
  <rect x="354" y="107" width="16" height="9" rx="4" fill="#2A2D3A"/>
  <!-- Status dot -->
  <circle cx="382" cy="65" r="6" fill="#10B981"/>
  <circle cx="382" cy="65" r="3" fill="#34D399"/>

  <!-- TABLE 3 — reserved (orange) -->
  <rect x="405" y="75" width="58" height="42" rx="8" fill="url(#th-table)" stroke="#F97316" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Reserved card -->
  <rect x="419" y="85" width="30" height="22" rx="4" fill="#1A1D26"/>
  <line x1="423" y1="92" x2="445" y2="92" stroke="#F97316" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="423" y1="98" x2="441" y2="98" stroke="#3A3F52" stroke-width="1" stroke-linecap="round"/>
  <!-- Chairs -->
  <rect x="408" y="64" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="428" y="64" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="408" y="118" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="428" y="118" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <!-- Status dot -->
  <circle cx="457" cy="79" r="6" fill="#F97316"/>
  <circle cx="457" cy="79" r="3" fill="#FB923C"/>

  <!-- TABLE 4 — small round, bottom -->
  <ellipse cx="290" cy="148" rx="28" ry="20" fill="url(#th-table)" stroke="#3A3F52" stroke-width="1.5"/>
  <ellipse cx="290" cy="148" rx="18" ry="12" fill="#1A1D26" stroke="#2A2D3A" stroke-width="1"/>
  <!-- Chairs around -->
  <rect x="265" y="160" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="300" y="160" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="265" y="128" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <rect x="300" y="128" width="14" height="8" rx="4" fill="#2A2D3A"/>
  <!-- Status dot -->
  <circle cx="310" cy="135" r="5" fill="#FBBF24"/>
  <circle cx="310" cy="135" r="2.5" fill="#F59E0B"/>

  <!-- Legend mini -->
  <rect x="220" y="26" width="68" height="26" rx="6" fill="#1A1D26" stroke="#2A2D3A" stroke-width="1"/>
  <circle cx="233" cy="39" r="4" fill="#10B981"/>
  <line x1="242" y1="39" x2="256" y2="39" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="267" cy="39" r="4" fill="#EF4444"/>
  <line x1="276" y1="39" x2="284" y2="39" stroke="#3A3F52" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Decorative dots -->
  <g opacity="0.12">
    <circle cx="228" cy="165" r="2" fill="#3B82F6"/>
    <circle cx="240" cy="165" r="2" fill="#3B82F6"/>
    <circle cx="228" cy="153" r="2" fill="#3B82F6"/>
  </g>

  <!-- Left fade -->
  <rect width="215" height="180" fill="url(#th-bg)" opacity="0.6"/>
</svg>
