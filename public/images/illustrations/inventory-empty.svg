<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="inv-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="inv-shelf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background shelf rows -->
  <rect x="16" y="108" width="128" height="3" rx="1.5" fill="url(#inv-shelf)" opacity="0.6"/>
  <rect x="16" y="80"  width="128" height="3" rx="1.5" fill="url(#inv-shelf)" opacity="0.5"/>
  <rect x="16" y="52"  width="128" height="3" rx="1.5" fill="url(#inv-shelf)" opacity="0.4"/>

  <!-- Shelf vertical supports -->
  <rect x="16"  y="52" width="3" height="59" rx="1.5" fill="#F97316" opacity="0.2"/>
  <rect x="141" y="52" width="3" height="59" rx="1.5" fill="#F97316" opacity="0.2"/>
  <rect x="78"  y="52" width="2" height="59" rx="1"   fill="#F97316" opacity="0.15"/>

  <!-- Box 1 (left shelf, bottom) - present -->
  <rect x="22" y="88"  width="22" height="18" rx="3" fill="url(#inv-box)" stroke="#F97316" stroke-width="1.2"/>
  <line x1="33" y1="88" x2="33" y2="106" stroke="#F97316" stroke-width="0.8" opacity="0.4"/>
  <path d="M22 94 Q33 97 44 94" stroke="#F97316" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Box 2 (left shelf, bottom) - smaller -->
  <rect x="48" y="92" width="16" height="14" rx="2.5" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="1.2"/>
  <line x1="56" y1="92" x2="56" y2="106" stroke="#10B981" stroke-width="0.8" opacity="0.3"/>

  <!-- Box right side (bottom) -->
  <rect x="86" y="87" width="25" height="19" rx="3" fill="url(#inv-box)" stroke="#F97316" stroke-width="1.2"/>
  <line x1="99" y1="87" x2="99" y2="106" stroke="#F97316" stroke-width="0.8" opacity="0.4"/>
  <path d="M86 94 Q99 97 111 94" stroke="#F97316" stroke-width="0.8" fill="none" opacity="0.4"/>
  <rect x="120" y="93" width="15" height="13" rx="2" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1.2"/>

  <!-- Middle shelf - some boxes present, some ghost -->
  <rect x="22" y="60"  width="20" height="16" rx="3" fill="url(#inv-box)" stroke="#F97316" stroke-width="1.2"/>
  <!-- Ghost/empty spot on middle left -->
  <rect x="47" y="62" width="24" height="14" rx="3" fill="none" stroke="#F97316" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <!-- Box right middle -->
  <rect x="86" y="60" width="18" height="16" rx="2.5" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="1.2"/>
  <rect x="110" y="62" width="24" height="14" rx="3" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- Top shelf - mostly empty ghost spots -->
  <rect x="22" y="33"  width="24" height="14" rx="3" fill="none" stroke="#F97316" stroke-width="1" stroke-dasharray="3 2" opacity="0.25"/>
  <rect x="52" y="33"  width="20" height="14" rx="3" fill="none" stroke="#F97316" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>
  <rect x="86" y="33"  width="24" height="14" rx="3" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>
  <rect x="116" y="33" width="20" height="14" rx="3" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>

  <!-- Magnifier centered -->
  <circle cx="80" cy="120" r="14" fill="none" stroke="#F97316" stroke-width="2" opacity="0.35"/>
  <line   x1="91" y1="131" x2="100" y2="140" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Question mark inside -->
  <text x="80" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#F97316" font-family="system-ui" opacity="0.45">?</text>

  <!-- Decorative sparkles -->
  <circle cx="138" cy="28" r="2"   fill="#F97316" opacity="0.3"/>
  <circle cx="22"  cy="26" r="1.5" fill="#10B981" opacity="0.3"/>
  <circle cx="145" cy="75" r="1.5" fill="#F97316" opacity="0.25"/>
</svg>
