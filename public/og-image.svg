<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F97316" stroke-width="0.4" stroke-opacity="0.12"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1117"/>
      <stop offset="100%" stop-color="#1A1D26"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="#F97316" fill-opacity="0.06"/>
  <ellipse cx="1000" cy="315" rx="250" ry="180" fill="#F97316" fill-opacity="0.04"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#F97316"/>
  <path d="M92 104 C92 104 96 100 112 100 C128 100 132 104 132 104" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M112 102 L112 134" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M96 114 C96 114 102 109 112 109 C122 109 128 114 128 114 L128 130 C128 132 126 134 124 134 L100 134 C98 134 96 132 96 130 Z" fill="white" fill-opacity="0.9"/>
  <circle cx="104" cy="124" r="3" fill="#F97316"/>
  <circle cx="120" cy="124" r="3" fill="#F97316"/>

  <!-- Brand name -->
  <text x="165" y="103" fill="#F1F3F9" font-size="36" font-weight="800" font-family="Inter,system-ui,sans-serif">FoodERP</text>
  <text x="165" y="132" fill="#6B7390" font-size="18" font-family="Inter,system-ui,sans-serif">Restaurant Management System</text>

  <!-- Divider -->
  <line x1="80" y1="175" x2="1120" y2="175" stroke="#2A2D3A" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="270" fill="#F1F3F9" font-size="56" font-weight="800" font-family="Inter,system-ui,sans-serif">Full-Stack Restaurant ERP</text>
  <text x="80" y="330" fill="#6B7390" font-size="28" font-family="Inter,system-ui,sans-serif">POS · Kitchen Display · Delivery Tracking · Analytics · Loyalty</text>

  <!-- Tech badges -->
  <rect x="80"  y="380" width="140" height="36" rx="8" fill="#1E2130" stroke="#2A2D3A" stroke-width="1"/>
  <text x="100" y="403" fill="#F97316" font-size="15" font-weight="600" font-family="Inter,system-ui,sans-serif">Next.js 16</text>

  <rect x="234" y="380" width="128" height="36" rx="8" fill="#1E2130" stroke="#2A2D3A" stroke-width="1"/>
  <text x="254" y="403" fill="#61DAFB" font-size="15" font-weight="600" font-family="Inter,system-ui,sans-serif">React 19</text>

  <rect x="376" y="380" width="148" height="36" rx="8" fill="#1E2130" stroke="#2A2D3A" stroke-width="1"/>
  <text x="396" y="403" fill="#38BDF8" font-size="15" font-weight="600" font-family="Inter,system-ui,sans-serif">Tailwind v4</text>

  <rect x="538" y="380" width="140" height="36" rx="8" fill="#1E2130" stroke="#2A2D3A" stroke-width="1"/>
  <text x="558" y="403" fill="#A78BFA" font-size="15" font-weight="600" font-family="Inter,system-ui,sans-serif">Zustand v5</text>

  <rect x="692" y="380" width="192" height="36" rx="8" fill="#1E2130" stroke="#2A2D3A" stroke-width="1"/>
  <text x="712" y="403" fill="#FB923C" font-size="15" font-weight="600" font-family="Inter,system-ui,sans-serif">Framer Motion 12</text>

  <!-- Demo badge -->
  <rect x="80" y="455" width="148" height="32" rx="8" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="100" cy="471" r="5" fill="#34D399"/>
  <text x="112" y="476" fill="#F97316" font-size="14" font-weight="700" font-family="Inter,system-ui,sans-serif">Demo Mode</text>

  <!-- Decorative chart lines (right side) -->
  <polyline points="800,280 850,240 910,255 970,200 1030,215 1090,170 1120,155"
    fill="none" stroke="#F97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <polyline points="800,310 850,295 910,300 970,270 1030,280 1090,240 1120,228"
    fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="8 4" opacity="0.5"/>
  <circle cx="1090" cy="170" r="5" fill="#F97316"/>
  <circle cx="1120" cy="155" r="5" fill="#F97316"/>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1A1D26"/>
  <text x="80" y="615" fill="#555B6E" font-size="14" font-family="Inter,system-ui,sans-serif">Portfolio Project · No backend · All data from JSON files · TypeScript</text>
  <text x="1000" y="615" fill="#555B6E" font-size="14" font-family="Inter,system-ui,sans-serif">demo-food</text>
</svg>
